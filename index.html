<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador FALL90HZ</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#000;
    color:white;
}

.wrapper{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:#111111;
    padding:25px;
    border-radius:20px;
    width:100%;
    max-width:320px;
    box-shadow:0 0 30px rgba(255,0,0,0.5);
}

h1{
    text-align:center;
    font-size:20px;
    margin-bottom:5px;
    color:#ff2e2e;
}

.creator{
    text-align:center;
    font-size:13px;
    margin-bottom:20px;
    color:#aaa;
}

input, select{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:12px;
    font-size:14px;
    background:#1c1c1c;
    color:white;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(90deg,#ff0000,#ff4d4d);
    color:white;
    transition:0.3s;
    margin-bottom:10px;
}

button:hover{
    opacity:0.85;
}

.result{
    margin-top:20px;
    background:#1a1a1a;
    padding:15px;
    border-radius:12px;
    font-size:14px;
    line-height:1.6;
}

.erro{
    color:#ffcc00;
    font-size:13px;
    margin-top:-5px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

    <h1>🎯 FALL90HZ</h1>
    <div class="creator">Não esqueça de seguir o dono do perfil 🔥</div>

    <input type="text" id="celular" placeholder="Digite seu celular (Ex: Realme C75)">

    <select id="nivel">
        <option value="alta">Alta</option>
        <option value="media">Média</option>
        <option value="baixa">Baixa</option>
    </select>

    <div class="erro" id="erro"></div>

    <button onclick="gerar()">GERAR SENSIBILIDADE</button>

    <!-- BOTÃO TIKTOK CORRIGIDO -->
    <a href="https://www.tiktok.com/@fall90hz?_r=1&_t=ZS-94Adwamm1Ce" target="_blank" style="text-decoration:none;">
        <button type="button">SIGA O DONO NO TIKTOK</button>
    </a>

    <div class="result" id="resultado" style="display:none;"></div>

</div>
</div>

<script>
function random(min, max){
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function gerar(){

    var celular = document.getElementById("celular").value.trim();
    var nivel = document.getElementById("nivel").value;
    var erro = document.getElementById("erro");

    erro.innerHTML = "";

    if(celular === ""){
        erro.innerHTML = "⚠ Digite o modelo do celular!";
        return;
    }

    var geral, redDot, doisX, quatroX, awm, dpi, tamanho;

    if(nivel === "alta"){
        geral = random(170,200);
        redDot = random(170,200);
        doisX = random(160,190);
        quatroX = random(140,180);
        awm = random(120,170);
        dpi = random(700,1000);
        tamanho = random(40,55);
    }

    if(nivel === "media"){
        geral = random(140,170);
        redDot = random(140,170);
        doisX = random(130,160);
        quatroX = random(110,150);
        awm = random(90,140);
        dpi = random(500,800);
        tamanho = random(45,60);
    }

    if(nivel === "baixa"){
        geral = random(100,140);
        redDot = random(100,140);
        doisX = random(90,130);
        quatroX = random(80,120);
        awm = random(70,110);
        dpi = random(360,600);
        tamanho = random(50,65);
    }

    document.getElementById("resultado").style.display="block";
    document.getElementById("resultado").innerHTML = `
    📱 Celular: <b>${celular}</b><br><br>
    🎯 Geral: ${geral}<br>
    🔴 Red Dot: ${redDot}<br>
    🔭 2X: ${doisX}<br>
    🔎 4X: ${quatroX}<br>
    🎯 AWM: ${awm}<br>
    ⚙ DPI: ${dpi}<br>
    🔘 Tamanho do Botão: ${tamanho}
    `;
}
</script>

</body>
    </html>
