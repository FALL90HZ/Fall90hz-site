<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador FALL90HZ</title>

<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#000;
    color:white;
}

.wrapper{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
}

.container{
    background:#111111;
    padding:25px;
    border-radius:20px;
    width:100%;
    max-width:320px;
    box-shadow:0 0 30px rgba(255,0,0,0.5);
    margin-bottom:15px;
}

h1{
    text-align:center;
    font-size:20px;
    margin-bottom:5px;
    color:#ff2e2e;
}

.creator{
    text-align:center;
    font-size:13px;
    margin-bottom:20px;
    color:#aaa;
}

input, select{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:12px;
    font-size:14px;
    background:#1c1c1c;
    color:white;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(90deg,#ff0000,#ff4d4d);
    color:white;
    transition:0.3s;
    margin-bottom:10px;
}

button:hover{
    opacity:0.85;
}

.result{
    margin-top:20px;
    background:#1a1a1a;
    padding:15px;
    border-radius:12px;
    font-size:14px;
    line-height:1.6;
}

.erro{
    color:#ffcc00;
    font-size:13px;
    margin-top:-5px;
    margin-bottom:10px;
}

/* CARD DO ÁUDIO */
.audio-card{
    background:#111;
    padding:15px;
    border-radius:20px;
    width:100%;
    max-width:320px;
    box-shadow:0 0 25px rgba(255,0,0,0.5);
}

.audio-title{
    text-align:center;
    margin-bottom:12px;
    color:#ff2e2e;
    font-size:15px;
}

.custom-player{
    display:flex;
    align-items:center;
    gap:10px;
    background:#1a1a1a;
    padding:12px;
    border-radius:14px;
}

/* BOTÃO PLAY/PAUSE CSS */
#playBtn{
    width:45px;
    height:45px;
    border-radius:50%;
    border:none;
    background:#ff2e2e;
    cursor:pointer;
    position:relative;
    flex-shrink:0;
}

/* PLAY */
#playBtn.play::before{
    content:"";
    position:absolute;
    left:17px;
    top:13px;
    border-style:solid;
    border-width:10px 0 10px 16px;
    border-color:transparent transparent transparent white;
}

/* PAUSE */
#playBtn.pause::before,
#playBtn.pause::after{
    content:"";
    position:absolute;
    top:12px;
    width:6px;
    height:20px;
    background:white;
}

#playBtn.pause::before{
    left:14px;
}

#playBtn.pause::after{
    right:14px;
}

.progress-container{
    flex:1;
    height:5px;
    background:#333;
    border-radius:10px;
    cursor:pointer;
}

.progress{
    height:100%;
    width:0%;
    background:#ff2e2e;
    border-radius:10px;
}

#time{
    min-width:38px;
    text-align:right;
    font-size:13px;
    color:#ccc;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="container">

    <h1>🎯 FALL90HZ</h1>
    <div class="creator">Não esqueça de seguir o dono do perfil 🔥</div>

    <input type="text" id="celular" placeholder="Digite seu celular (Ex: Realme C75)">

    <select id="nivel">
        <option value="alta">Alta</option>
        <option value="media">Média</option>
        <option value="baixa">Baixa</option>
    </select>

    <div class="erro" id="erro"></div>

    <button onclick="gerar()">GERAR SENSIBILIDADE</button>

    <a href="https://www.tiktok.com/@fall90hz?_r=1&_t=ZS-94Adwamm1Ce" target="_blank" style="text-decoration:none;">
        <button type="button">SIGA O DONO NO TIKTOK</button>
    </a>

    <div class="result" id="resultado" style="display:none;"></div>

</div>

<!-- PLAYER DE ÁUDIO -->
<div class="audio-card">
    <div class="audio-title">🔊 Áudio Especial</div>

    <div class="custom-player">
        <button id="playBtn" class="play"></button>
        <div class="progress-container" id="progressContainer">
            <div class="progress" id="progress"></div>
        </div>
        <span id="time">0:00</span>
    </div>

    <audio id="audio" src="audio.mp3"></audio>
</div>

</div>

<script>
// === LISTAS DE MODELOS POR MARCA ===
const modelosApple = [
  "iPhone SE (2ª geração, 2020)",
  "iPhone 12 mini", "iPhone 12", "iPhone 12 Pro", "iPhone 12 Pro Max",
  "iPhone 13 mini", "iPhone 13", "iPhone 13 Pro", "iPhone 13 Pro Max",
  "iPhone 14", "iPhone 14 Plus", "iPhone 14 Pro", "iPhone 14 Pro Max",
  "iPhone SE (3ª geração, 2022)",
  "iPhone 15", "iPhone 15 Plus", "iPhone 15 Pro", "iPhone 15 Pro Max",
  "iPhone 16", "iPhone 16 Plus", "iPhone 16 Pro", "iPhone 16 Pro Max",
  "iPhone 17", "iPhone 17 Pro", "iPhone 17 Pro Max"
];

const modelosSamsung = [
  "Galaxy S20", "Galaxy S20+", "Galaxy S20 Ultra",
  "Galaxy S21", "Galaxy S21+", "Galaxy S21 Ultra",
  "Galaxy S22", "Galaxy S22+", "Galaxy S22 Ultra",
  "Galaxy S23", "Galaxy S23+", "Galaxy S23 Ultra",
  "Galaxy S24", "Galaxy S24+", "Galaxy S24 Ultra",
  "Galaxy S25", "Galaxy S25+", "Galaxy S25 Ultra",
  "Galaxy Z Flip 3", "Galaxy Z Flip 4", "Galaxy Z Flip 5",
  "Galaxy Z Fold 3", "Galaxy Z Fold 4", "Galaxy Z Fold 5",
  "Galaxy A53", "Galaxy A55", "Galaxy M36"
];

const modelosXiaomi = ["Xiaomi 11","Xiaomi 12","Xiaomi 13","Xiaomi 14","Xiaomi 15"];
const modelosRedmi = ["Redmi Note 10","Redmi Note 11","Redmi Note 12","Redmi Note 13"];
const modelosPoco = ["POCO X3","POCO X4","POCO X6","POCO M6","POCO F5"];
const modelosRealme = ["Realme C11","Realme 7","Realme 8","Realme 9","Realme GT 6","Realme 14"];
const modelosMotorola = ["Moto G77","Moto G67","Edge 50","Edge 60 Pro","Razr 50 Ultra"];
const modelosAsus = ["ASUS ZenFone 8","ASUS ZenFone 10","ROG Phone 8","ROG Phone 8 Pro"];
const modelosInfinix = ["Infinix Note 40","Infinix Hot 40","Infinix Zero 40"];
const modelosTecno = ["Tecno Camon 20","Tecno Camon 40","Tecno Pova 6 Neo"];
const modelosOnePlus = ["OnePlus 12","OnePlus 12R","OnePlus Nord 4"];
const modelosHuawei = ["Huawei Pura 70","Huawei Mate X6","Huawei Nova 12"];
const modelosHonor = ["Honor Magic 6 Pro","Honor 200 Pro"];
const modelosLG = ["LG G6","LG V50","LG K50"];
const modelosSony = ["Sony Xperia 10 VI","Sony Xperia 1 V","Sony Xperia 5 V"];

// Junta todas as listas para validação
const todosModelos = [].concat(
    modelosApple, modelosSamsung, modelosXiaomi, modelosRedmi, modelosPoco, modelosRealme,
    modelosMotorola, modelosAsus, modelosInfinix, modelosTecno, modelosOnePlus, modelosHuawei,
    modelosHonor, modelosLG, modelosSony
);

// Função gerar números aleatórios
function random(min, max){
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

// Função gerar sensibilidade
function gerar(){
    const celular = document.getElementById("celular").value.trim();
    const nivel = document.getElementById("nivel").value;
    const erro = document.getElementById("erro");
    const resultadoBox = document.getElementById("resultado");

    erro.innerHTML = "";
    resultadoBox.style.display = "none";

    if(celular === ""){
        erro.innerHTML = "⚠ Digite o modelo do celular!";
        return;
    }

    // Valida se o modelo está na lista
    if(!todosModelos.includes(celular)){
        erro.innerHTML = "⚠ Modelo não reconhecido! Digite um modelo de celular válido.";
        return;
    }

    let geral, redDot, doisX, quatroX, awm, dpi, tamanho, rolagem;
    const isIOS = modelosApple.includes(celular);

    if(nivel === "alta"){
        geral = random(170,200);
        redDot = random(170,200);
        doisX = random(160,190);
        quatroX = random(140,180);
        awm = random(120,170);
        dpi = random(700,1000);
        rolagem = random(80,100);
        tamanho = random(40,55);
    }
    if(nivel === "media"){
        geral = random(140,170);
        redDot = random(140,170);
        doisX = random(130,160);
        quatroX = random(110,150);
        awm = random(90,140);
        dpi = random(500,800);
        rolagem = random(60,85);
        tamanho = random(45,60);
    }
    if(nivel === "baixa"){
        geral = random(100,140);
        redDot = random(100,140);
        doisX = random(90,130);
        quatroX = random(80,120);
        awm = random(70,110);
        dpi = random(360,600);
        rolagem = random(40,70);
        tamanho = random(50,65);
    }

    resultadoBox.style.display="block";

    if(isIOS){
        resultadoBox.innerHTML = `
        📱 Celular: <b>${celular}</b><br><br>
        🎯 Geral: ${geral}<br>
        🔴 Red Dot: ${redDot}<br>
        🔭 2X: ${doisX}<br>
        🔎 4X: ${quatroX}<br>
        🎯 AWM: ${awm}<br>
        🍎 Sensibilidade Do Rastreamento (iOS): ${rolagem}<br>
        🔘 Tamanho do Botão: ${tamanho}
        `;
    } else{
        resultadoBox.innerHTML = `
        📱 Celular: <b>${celular}</b><br><br>
        🎯 Geral: ${geral}<br>
        🔴 Red Dot: ${redDot}<br>
        🔭 2X: ${doisX}<br>
        🔎 4X: ${quatroX}<br>
        🎯 AWM: ${awm}<br>
        ⚙ DPI: ${dpi}<br>
        🔘 Tamanho do Botão: ${tamanho}
        `;
    }
}

// PLAYER DE ÁUDIO
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const progress = document.getElementById("progress");
const progressContainer = document.getElementById("progressContainer");
const timeDisplay = document.getElementById("time");

playBtn.addEventListener("click", function(){
    if(audio.paused){
        audio.play();
        playBtn.classList.remove("play");
        playBtn.classList.add("pause");
    } else {
        audio.pause();
        playBtn.classList.remove("pause");
        playBtn.classList.add("play");
    }
});

audio.addEventListener("timeupdate", function(){
    if(audio.duration){
        const percent = (audio.currentTime / audio.duration) * 100;
        progress.style.width = percent + "%";

        let minutes = Math.floor(audio.currentTime / 60);
        let seconds = Math.floor(audio.currentTime % 60);
        if(seconds < 10) seconds = "0" + seconds;

        timeDisplay.innerHTML = minutes + ":" + seconds;
    }
});

progressContainer.addEventListener("click", function(e){
    const width = this.clientWidth;
    const clickX = e.offsetX;
    if(audio.duration){
        audio.currentTime = (clickX / width) * audio.duration;
    }
});
</script>

</body>
</html>
